<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#141210" />
    <meta
      name="description"
      content="Tu familia preparada para el próximo terremoto en 20 minutos — y sin internet. Kit de emergencia, plan familiar y guías offline."
    />
    <meta property="og:title" content="PrepHub — Preparación ante terremotos" />
    <meta
      property="og:description"
      content="Tu familia preparada para el próximo terremoto en 20 minutos — y sin internet."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512.png" />
    <link rel="icon" href="/icons/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PrepHub" />
    <title>PrepHub — Preparación ante terremotos</title>
    <script>
      // Theme init before first paint (default: dark — blackout/OLED friendly)
      ;(function () {
        try {
          var d = document.documentElement
          var t = localStorage.getItem('ph-theme')
          if (t !== 'light' && t !== 'dark') t = 'dark'
          d.setAttribute('data-theme', t)
          var m = document.querySelector('meta[name="theme-color"]')
          if (m) m.setAttribute('content', t === 'light' ? '#faf6f0' : '#141210')
          // accessibility prefs (NERV-style): text size, bold, contrast
          var tx = localStorage.getItem('ph-text')
          if (tx === '-1' || tx === '1' || tx === '2' || tx === '3') d.setAttribute('data-text', tx)
          if (localStorage.getItem('ph-bold') === '1') d.setAttribute('data-bold', '1')
          if (localStorage.getItem('ph-contrast') === 'high') d.setAttribute('data-contrast', 'high')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
